{% extends "base.html" %}
{% block title %}HKVelocity{% endblock %}

{% block content %}
<div class="page-title">Race List</div>

<form method="get" action="/" class="searchbar">
    <input type="text" name="q" placeholder="Search race..." value="{{ q }}">
    <select name="course">
        <option value="">All Courses</option>
        {% for c in courses %}
        <option value="{{ c }}" {% if course == c %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
    </select>
    <select name="sort">
        <option value="id" {% if sort == "id" %}selected{% endif %}>Sort by ID</option>
        <option value="date" {% if sort == "date" %}selected{% endif %}>Sort by Date</option>
        <option value="distance" {% if sort == "distance" %}selected{% endif %}>Sort by Distance</option>
    </select>
    <button type="submit">Search</button>
</form>

<div class="table-wrap">
    <table class="list-table">
        <thead>
            <tr>
                <th style="width: 70px;">ID</th>
                <th>Race</th>
                <th style="width: 140px;">Course</th>
                <th style="width: 120px;">Date</th>
                <th style="width: 100px;">Distance</th>
                <th style="width: 90px;">Open</th>
            </tr>
        </thead>
        <tbody>
            {% for race in races %}
            <tr>
                <td>{{ race.id }}</td>
                <td class="wrap"><a href="{{ url_for('race_detail', race_id=race.id) }}">{{ race.title }}</a></td>
                <td class="wrap">{{ race.course }}</td>
                <td>{{ race.date }}</td>
                <td>{{ race.distance }}m</td>
                <td><a href="{{ url_for('race_detail', race_id=race.id) }}">View</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
