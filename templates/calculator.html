{% extends "base.html" %}
{% block title %}Betting Calculator - HKVelocity{% endblock %}

{% block content %}
<div class="calculator-page">
    <div class="calc-header">
        <h1>🧮 投注組合計算器</h1>
    </div>

    <div class="calc-main-layout">
        <!-- 左邊：輸入區 -->
        <div class="calc-input-panel">
            <div class="panel-section">
                <h2>投注設定</h2>
                
                <div class="calc-input-group">
                    <label for="combo-type">組合類型</label>
                    <select id="combo-type" onchange="updateComboRaces()">
                        <option value="2">2 x N (2關組合)</option>
                        <option value="3">3 x N (3關組合)</option>
                        <option value="4">4 x N (4關組合)</option>
                        <option value="5">5 x N (5關組合)</option>
                        <option value="6">6 x N (6關組合)</option>
                    </select>
                </div>

                <div class="calc-input-group">
                    <label for="bet-amount-combo">單位投注 (HKD)</label>
                    <input type="number" id="bet-amount-combo" placeholder="輸入單位投注金額" min="1" step="1" value="100">
                </div>
            </div>

            <!-- 賠率輸入區 -->
            <div class="panel-section">
                <h2>各關賠率</h2>
                <div class="combo-races-container" id="combo-races-container">
                </div>
            </div>

            <button class="calc-btn" onclick="calculateCombination()">🧮 計算組合</button>
        </div>

        <!-- 右邊：結果區 -->
        <div class="calc-results-panel" id="calc-results-panel" style="display: none;">
            <!-- 摘要區 -->
            <div class="results-summary">
                <div class="summary-item">
                    <span class="summary-label">組合類型</span>
                    <span class="summary-value" id="summary-type">-</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">組合數量</span>
                    <span class="summary-value" id="summary-combos">-</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">單位投注</span>
                    <span class="summary-value" id="summary-unit">-</span>
                </div>
                <div class="summary-item">
                    <span class="summary-label">總投注</span>
                    <span class="summary-value" id="summary-total-bet">-</span>
                </div>
                <div class="summary-item highlight">
                    <span class="summary-label">賠率總和</span>
                    <span class="summary-value" id="summary-odds-sum">-</span>
                </div>
                <div class="summary-item highlight">
                    <span class="summary-label">潛在回報</span>
                    <span class="summary-value" id="summary-return">-</span>
                </div>
            </div>

            <!-- 結果表格 -->
            <div class="results-table-wrapper">
                <h3>📊 所有組合結果</h3>
                <table class="combo-results-table">
                    <thead>
                        <tr>
                            <th>組合</th>
                            <th>結果</th>
                            <th>賠率</th>
                            <th>投注</th>
                            <th>回報</th>
                            <th>獲利</th>
                        </tr>
                    </thead>
                    <tbody id="combo-results-tbody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function updateComboRaces() {
        const comboType = document.getElementById('combo-type').value;
        const container = document.getElementById('combo-races-container');
        container.innerHTML = '';

        for (let i = 1; i <= comboType; i++) {
            container.innerHTML += `
                <div class="race-input-group">
                    <label>第 ${i} 關</label>
                    <div class="race-odds-inputs">
                        <input type="number" class="race-odds" placeholder="贏" step="0.01" min="1" data-race="${i}" data-result="win">
                        <input type="number" class="race-odds" placeholder="輸" step="0.01" min="0" data-race="${i}" data-result="loss">
                    </div>
                </div>
            `;
        }
    }

    function calculateCombination() {
        const comboType = parseInt(document.getElementById('combo-type').value);
        const betAmount = parseFloat(document.getElementById('bet-amount-combo').value);

        if (isNaN(betAmount) || betAmount <= 0) {
            alert('請輸入有效的投注金額');
            return;
        }

        // 收集每一關的賠率
        const races = [];
        for (let i = 1; i <= comboType; i++) {
            const winOdds = parseFloat(document.querySelector(`[data-race="${i}"][data-result="win"]`).value) || 0;
            const lossOdds = parseFloat(document.querySelector(`[data-race="${i}"][data-result="loss"]`).value) || 0;

            if (winOdds <= 0 && lossOdds <= 0) {
                alert(`第 ${i} 關請至少輸入一個賠率`);
                return;
            }

            races.push({
                race: i,
                win: winOdds,
                loss: lossOdds,
                options: []
            });

            // 生成這一關的選項
            if (winOdds > 0) races[i-1].options.push({ result: '贏', odds: winOdds });
            if (lossOdds > 0) races[i-1].options.push({ result: '輸', odds: lossOdds });
        }

        // 計算所有組合
        const combinations = [];
        function generateCombinations(raceIndex, currentCombo, currentOdds, comboDetails) {
            if (raceIndex === comboType) {
                combinations.push({
                    combo: currentCombo,
                    odds: currentOdds,
                    details: comboDetails
                });
                return;
            }

            races[raceIndex].options.forEach(option => {
                generateCombinations(
                    raceIndex + 1,
                    currentCombo + `R${races[raceIndex].race}:${option.result} `,
                    currentOdds * option.odds,
                    [...comboDetails, `R${races[raceIndex].race}:${option.result}`]
                );
            });
        }

        generateCombinations(0, '', 1, []);

        // 顯示結果
        displayComboResults(combinations, betAmount, comboType);
    }

    function displayComboResults(combinations, betAmount, comboType) {
        const totalCombos = combinations.length;
        const totalBet = betAmount * totalCombos;
        const oddsSum = combinations.reduce((sum, c) => sum + c.odds, 0);
        const potentialReturn = betAmount * oddsSum;

        // 更新摘要
        document.getElementById('summary-type').textContent = `${comboType}關組合`;
        document.getElementById('summary-combos').textContent = totalCombos;
        document.getElementById('summary-unit').textContent = `HKD $${betAmount.toFixed(2)}`;
        document.getElementById('summary-total-bet').textContent = `HKD $${totalBet.toFixed(2)}`;
        document.getElementById('summary-odds-sum').textContent = oddsSum.toFixed(2);
        document.getElementById('summary-return').textContent = `HKD $${potentialReturn.toFixed(2)}`;

        // 生成表格行
        const tbody = document.getElementById('combo-results-tbody');
        tbody.innerHTML = '';

        combinations.forEach((combo, index) => {
            const returnAmount = betAmount * combo.odds;
            const profit = returnAmount - betAmount;
            
            // 根據獲利著色
            const profitColor = profit > 0 ? '#3ddc97' : profit < 0 ? '#ff6b6b' : '#999';

            const row = `
                <tr>
                    <td class="combo-number">${String(index + 1).padStart(2, '0')}</td>
                    <td class="combo-result">${combo.combo.trim()}</td>
                    <td class="combo-odds">${combo.odds.toFixed(2)}</td>
                    <td class="combo-bet">HKD $${betAmount.toFixed(2)}</td>
                    <td class="combo-return">HKD $${returnAmount.toFixed(2)}</td>
                    <td class="combo-profit" style="color: ${profitColor}; font-weight: 700;">HKD $${profit.toFixed(2)}</td>
                </tr>
            `;

            tbody.innerHTML += row;
        });

        document.getElementById('calc-results-panel').style.display = 'block';
    }

    // 初始化
    updateComboRaces();
</script>
{% endblock %}
